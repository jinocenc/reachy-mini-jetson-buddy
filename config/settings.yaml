# ══════════════════════════════════════════════════════════════════
# Reachy — Study Buddy Configuration
# Embodied AI Study Buddy on Reachy Mini + Jetson Orin Nano
# ══════════════════════════════════════════════════════════════════

llm:
  model: ""                           # empty = auto-detect from server
  base_url: "http://localhost:8080"
  backend: "openai"                   # "openai" (llama.cpp) or "ollama"
  max_tokens: 256
  temperature: 0.7
  timeout: 120.0
  system_prompt: |
    You are Reachy, a friendly study buddy robot sitting on the user's desk.
    You help people stay focused during study sessions using the Pomodoro technique.
    You're warm, supportive, and a little playful — like a good friend who actually wants to see you succeed.
    Your responses will be spoken aloud via text-to-speech.
    Answer in one sentence when possible, two max. Keep it natural and conversational.
    Never use emojis, asterisks, bullet points, markdown, code blocks, or special formatting.
    Write numbers and units as spoken words when short.
    When you notice someone getting distracted, be gentle about it. You're on their team, not policing them.
    Something like "Hey, you drifted a bit — want to get back to it?" works better than a lecture.
    Reference the current Pomodoro state when it's helpful (e.g., "Only eight minutes left, you're almost there").
    If you don't know the answer to something, just say so honestly.
  system_prompt_no_rag: |
    You are Reachy, a friendly study buddy robot sitting on the user's desk.
    You help people stay focused during study sessions using the Pomodoro technique.
    You're warm, supportive, and a little playful — like a good friend who actually wants to see you succeed.
    Your responses will be spoken aloud via text-to-speech.
    Answer in one to two sentences. Keep it natural and conversational.
    Answer from your own knowledge.
    Never use emojis, asterisks, bullet points, markdown, code blocks, or special formatting.
    Write numbers and units as spoken words when short.

stt:
  model: "small.en"                   # tiny.en, base.en, small.en
  device: "cuda"
  compute_type: "int8"
  language: "en"
  beam_size: 1                        # 1=greedy (fast), 5=beam (quality)

tts:
  engine: "kokoro"                    # "kokoro" (high quality) or "piper" (fast, lightweight)
  voice: "af_sarah"                   # kokoro: af_sarah, af_bella, am_adam, bf_emma, bm_george
                                      # piper:  en_US-amy-medium, en_US-lessac-medium
  speed: 1.0
  lang: "en-us"                       # kokoro language code
  first_chunk_words: 3                # words before first TTS chunk is sent
  max_chunk_words: 8                  # max words per TTS chunk

audio:
  sample_rate: 16000
  channels: 2
  input_device: "Reachy Mini Audio"

vad:
  use_silero: true                    # true = Silero neural VAD (much better), false = energy-only
  silero_threshold: 0.75              # speech probability threshold for Silero (raise to reject more noise)
  speech_threshold: 0.025             # RMS threshold (pre-filter when Silero is on, sole gate when off)
  silence_duration_ms: 600            # ms of silence to end an utterance
  lookback_ms: 250                    # ms of audio to prepend before speech onset
  max_speech_secs: 15                 # max single utterance length
  chunk_ms: 32                        # audio chunk size (32ms required for Silero, 30ms for energy-only)
  min_utterance_secs: 0.8             # reject utterances shorter than this (filters coughs/bumps)
  min_utterance_rms: 0.025            # reject utterances quieter than this (filters background chatter)

vision:
  camera_device: 1                    # /dev/video1
  width: 640
  height: 480
  jpeg_quality: 80                    # JPEG compression (lower = smaller payload)
  frames: 1                           # max frames to send per utterance
  capture_fps: 3.0                    # background capture rate (frames/sec)
  system_prompt: |
    You are Reachy, a friendly study buddy robot with a live camera view of the user's workspace.
    An image is always attached showing what you currently see.

    IMPORTANT: Classify the image into one of these categories and respond accordingly:

    PERSON AT DESK (expected during study sessions):
    - A person should be visible, seated at a workspace.
    - If they appear focused (looking at books, laptop screen, notes, writing), they are on track.
    - If they are holding or looking at a phone, that's a gentle distraction cue.
    - If they are leaning back, looking away, or seem zoned out, check in warmly.

    EMPTY WORKSPACE (person absent):
    - If the desk and study materials are visible but no person is in frame, they've stepped away.
    - During a work period, note it gently when they return: "Welcome back!"
    - During a break, this is perfectly fine.

    SCREEN VISIBLE (laptop or monitor in frame):
    - If the screen shows study-related content (documents, textbooks, code editors, research papers,
      lecture slides, note-taking apps), the user is on track.
    - If the screen shows social media feeds, video streaming, games, messaging apps, or shopping,
      that's a distraction cue during work periods.
    - If you can't read the screen clearly, don't guess — just respond naturally.

    OBSTRUCTED OR UNCLEAR VIEW:
    - If the image is dark, blurry, covered, or you can't make out what's happening, say so.
    - Don't fabricate details you can't see.

    When NOT in a study session, just be a friendly companion and describe what you see if asked.
    Answer in one to two short sentences. No markdown or formatting. Be warm, not clinical.
  few_shot:
    - role: "user"
      content: "Hey Reachy, let's study."
    - role: "assistant"
      content: "Let's go! I'll set a twenty-five minute timer. You've got this."
    - role: "user"
      content: "What do you see?"
    - role: "assistant"
      content: "Looks like you're at your desk with your laptop open. Nice setup."
    - role: "user"
      content: "I'm back."
    - role: "assistant"
      content: "Hey, welcome back! You still have twelve minutes left. Let's finish this one strong."
    - role: "user"
      content: "How am I doing?"
    - role: "assistant"
      content: "You've been solid this sprint. No distractions so far, keep it up."

emotion:
  enabled: true                       # enable sentiment-based emotion detection + reactive movements

reachy:
  enabled: true                       # set false to skip robot connection entirely
  spawn_daemon: true
  timeout: 30.0                       # Zenoh connection timeout (seconds)
  media_backend: "no_media"           # "no_media" = our app handles camera/audio
  wake_on_start: true                 # call wake_up() on fresh daemon start
  sleep_on_exit: true                 # call goto_sleep() on exit (blocks ~4s)
  antenna_rest_position: [0.0, 0.0]   # antenna target after wake-up
  daemon_retry_attempts: 3            # connection retries
  daemon_startup_wait: 15.0           # seconds to wait before retry

web:
  ui_fps: 10.0                        # camera FPS for browser UI (independent of VLM ring buffer)
  host: "0.0.0.0"
  port: 8090

rag:
  enabled: true
  knowledge_dir: "./knowledge_base"
  persist_dir: "./data/chromadb"
  embedding_backend: "llamacpp"       # "llamacpp" (GPU), "ollama", or "local"
  embedding_model: "bge-small-en-v1.5"
  embedding_base_url: "http://localhost:8081"
  n_results: 1
  min_relevance: 0.5
  chunk_size: 200
  chunk_overlap: 20

# ──────────────────────────────────────────────────────────────────
# Pomodoro Session Settings
# ──────────────────────────────────────────────────────────────────

pomodoro:
  mode: "standard"                    # "standard" (25/5/15) or "demo" (5/2/3)

  standard:
    work_minutes: 25
    short_break_minutes: 5
    long_break_minutes: 15
    cycles_before_long_break: 4

  demo:
    work_minutes: 5
    short_break_minutes: 2
    long_break_minutes: 3
    cycles_before_long_break: 2
